<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV ChargeOps - GoodWe Intelligence</title>
    <style>
        /* GoodWe Corporate Palette */
        :root {
            --gw-red: #cc0000;
            --gw-dark: #2c2e33;
            --gw-light: #f4f5f7;
            --gw-white: #ffffff;
            --gw-border: #e0e0e0;
        }
        
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Fundo animado corporativo (Efeito Inteligencia Artificial) */
        body { 
            margin: 0; 
            /* Gradiente combinando o cinza escuro e um leve reflexo do vermelho GoodWe */
            background: linear-gradient(-45deg, #151618, #2c2e33, #4a0000, #1a1b1e);
            background-size: 400% 400%;
            animation: iaBreathing 15s ease infinite;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        
        /* O motor do movimento: move o background de um lado para o outro de forma fluida */
        @keyframes iaBreathing {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .chat-container { 
            width: 100%; 
            max-width: 500px; 
            background: var(--gw-white); 
            border-radius: 8px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: flex; 
            flex-direction: column; 
            height: 85vh; 
            overflow: hidden; 
        }
        
        /* Header corporativo */
        .chat-header { 
            background: var(--gw-white); 
            padding: 15px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 3px solid var(--gw-red); 
        }
        
        .chat-header img { 
            max-height: 35px; 
            /* Se a imagem falhar, mostra o alt text limpo */
            color: var(--gw-red);
            font-weight: bold;
        }
        
        .chat-header .title { 
            color: var(--gw-dark); 
            font-weight: 600; 
            font-size: 1rem; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        /* Fundo do chat com marca d'agua do logo 2 */
        .chat-messages { 
            flex: 1; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            background-color: var(--gw-light); 
            background-image: url('img/logogoodwe2.pngx'); 
            background-repeat: no-repeat; 
            background-position: center; 
            background-size: 60%; 
            /* Deixa a imagem sutil para nao atrapalhar a leitura */
            background-blend-mode: screen; 
        }
        
        .message { 
            max-width: 85%; 
            padding: 12px 16px; 
            border-radius: 6px; 
            line-height: 1.5; 
            font-size: 0.95rem; 
            box-shadow: 0 1px 2px rgba(0,0,0,0.05); 
        }
        
        /* Estilo Bot: Limpo, borda vermelha lateral */
        .bot-message { 
            background: var(--gw-white); 
            color: var(--gw-dark); 
            align-self: flex-start; 
            border-left: 4px solid var(--gw-red); 
            border-bottom-left-radius: 0; 
        }
        
        /* Estilo User: Vermelho GoodWe */
        .user-message { 
            background: var(--gw-red); 
            color: var(--gw-white); 
            align-self: flex-end; 
            border-bottom-right-radius: 0; 
        }
        
        .chat-input { 
            display: flex; 
            padding: 15px; 
            background: var(--gw-white); 
            border-top: 1px solid var(--gw-border); 
        }
        
        .chat-input input { 
            flex: 1; 
            padding: 12px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            outline: none; 
            font-size: 1rem; 
            color: var(--gw-dark); 
            transition: border 0.3s;
        }
        
        .chat-input input:focus { 
            border-color: var(--gw-red); 
        }
        
        .chat-input button { 
            background: var(--gw-red); 
            color: var(--gw-white); 
            border: none; 
            padding: 10px 20px; 
            margin-left: 10px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: background 0.3s; 
        }
        
        .chat-input button:hover { 
            background: #a30000; 
        }
        
        .loading { 
            font-size: 0.8rem; 
            color: #888; 
            align-self: center; 
            display: none; 
            margin-top: -5px; 
            margin-bottom: 10px; 
            font-weight: 500;   
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <img src="img/logogoodwe1.svg" alt="GoodWe Logo">
        <span class="title">EV ChargeOps</span>
    </div>
    
    <div class="chat-messages" id="chatMessages">
        <div class="message bot-message">
            <strong>Síndico Virtual GoodWe</strong><br>
            Olá. O sistema ChargeOps está online. Como posso auxiliar na gestão da sua infraestrutura de recarga hoje?
        </div>
    </div>
    
    <div class="loading" id="loadingIndicator">Analisando base de dados da infraestrutura...</div>
    
    <div class="chat-input">
        <input type="text" id="userInput" placeholder="Digite sua solicitação técnica..." onkeypress="handleKeyPress(event)">
        <button onclick="sendMessage()">Enviar</button>
    </div>
</div>

<script>
    async function sendMessage() {
        const inputField = document.getElementById('userInput');
        const messageText = inputField.value.trim();
        if (!messageText) return;

        addMessageToChat(messageText, 'user-message');
        inputField.value = '';
        
        const loading = document.getElementById('loadingIndicator');
        loading.style.display = 'block';

        try {
            const response = await fetch('http://127.0.0.1:8000/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ texto: messageText })
            });
            
            const data = await response.json();
            loading.style.display = 'none';
            
            if (response.ok) {
                addMessageToChat(data.resposta_ia, 'bot-message');
            } else {
                addMessageToChat('Erro: Falha na comunicação com os servidores centrais.', 'bot-message');
            }
        } catch (error) {
            loading.style.display = 'none';
            addMessageToChat('Erro crítico: Sem conexão com a API do ChargeOps.', 'bot-message');
        }
    }

    function addMessageToChat(text, className) {
        const chatBox = document.getElementById('chatMessages');
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${className}`;
        
        // Transforma quebras de linha da IA em <br> no HTML
        messageDiv.innerHTML = text.replace(/\n/g, '<br>');
        
        chatBox.appendChild(messageDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleKeyPress(event) {
        if (event.key === 'Enter') {
            sendMessage();
        }
    }
</script>

</body>
</html>
